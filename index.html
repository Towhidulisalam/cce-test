<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header and Footer Template</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Ensures the footer is at the bottom of the viewport */
        }
        header {
            background-color: #333;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }
        main {
            flex: 1; /* Pushes the footer down */
            padding: 20px;
        }
        footer {
            background-color: #eee;
            color: black;
            text-align: center;
            padding: 10px 0;
            margin-top: auto; /* Ensures the footer stays at the bottom */
        }
    </style>
</head>
<body>

    <header>
        <h1>Website Title</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
        </nav>
    </header>

    <main>
        <h2>Main Content Section</h2>
        <p>This is the main content of the webpage. The header and footer will remain consistent across pages that use this structure.</p>
    </main>

    <footer>
        <p>&copy; 2026 My Website. | [Privacy Policy](#)</p>
    </footer>

</body>
</html>
